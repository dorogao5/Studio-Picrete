server {
    listen 80;
    server_name dev.picrete.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name dev.picrete.com;

    # certbot --nginx -d dev.picrete.com заполнит пути к сертификатам
    ssl_certificate /etc/letsencrypt/live/dev.picrete.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.picrete.com/privkey.pem;

    root /var/www/picrete-studio;
    index index.html;

    client_max_body_size 20m;

    location /api/ {
        proxy_pass http://127.0.0.1:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Request-Id $request_id;
        # LLM-сравнения и DataLab OCR работают долго
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location /healthz {
        proxy_pass http://127.0.0.1:8100/healthz;
    }

    location / {
        try_files $uri /index.html;
    }
}
